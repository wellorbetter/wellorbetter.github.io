# ========================
# Butterfly 主题配置
# ========================

# 导航栏
nav:
  logo:
  display_title: true
  fixed: false

menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open
  关于: /about/ || fas fa-user

# 社交链接
social:
  fab fa-github: https://github.com/wellorbetter || GitHub
  fas fa-envelope: mailto:1419919418@qq.com || Email

# 首页打字机座右铭
subtitle:
  enable: true
  effect: true
  typed_option:
    loop: true
    typeSpeed: 150
    backSpeed: 50
    startDelay: 300
  source: false
  sub:
    - 一定要好好学习魔法！
    - 今日份的魔法书看了吗？今天好好学习魔法了吗？
    - 似乎有点困难，那就明天学习魔法吧！
    - 明天的事情交给明天的我去烦恼吧！

# 头像
avatar:
  img: /image/1061286.jpg
  effect: false

# 顶部图配置
index_img: /image/752857.jpg
default_top_img: /image/752857.jpg
archive_img: /image/752857.jpg
tag_img:
tag_per_img:
category_img:
category_per_img:

# 文章封面
cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  position: top
  default_cover:
    - /image/599136.jpg
    - /image/673345.jpg
    - /image/677464.jpg
    - /image/695560.jpg
    - /image/746013.jpg
    - /image/752791.jpg
    - /image/875222.jpg
    - /image/915332.jpg

# favicon
favicon: /img/favicon.png

# 文章信息
post_meta:
  page:
    date_type: created
    date_format: YYYY-MM-DD
    categories: true
    tags: true
    label: true
  post:
    date_type: created
    date_format: YYYY-MM-DD
    categories: true
    tags: true
    label: true

# 文章字数统计（需安装插件，先关闭）
wordcount:
  enable: false

# 目录
toc:
  post: true
  page: false
  number: false
  expand: false
  style_simple: false
  scroll_percent: true

# 代码块
highlight_theme: mac
highlight_copy: true
highlight_lang: true
highlight_shrink: false
highlight_height_limit: false
code_word_wrap: false

# 主题色
theme_color:
  enable: true
  main: "#49B1F5"
  paginator: "#00c4b6"
  button_hover: "#FF7242"
  text_selection: "#00c4b6"
  link_color: "#99a9bf"
  meta_color: "#858585"
  hr_color: "#A4D8FA"
  code-foreground: "#F8F8F2"
  code-background: "rgba(0,0,0,0.67)"
  toc-highlight: "#0099FF"
  blockquote-padding-color: "#49b1f5"
  blockquote-background-color: "#49b1f5"
  scrollbar-color: "#49b1f5"
  meta-theme-color-light: "#ffffff"
  meta-theme-color-dark: "#0d0d0d"

# 暗色模式
darkmode:
  enable: true
  button: true
  autoChangeMode: false
  default: light

# 底部
footer:
  owner:
    enable: true
    since: 2022
  custom_text:
  copyright: false

# 侧边栏
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description: 努力学习魔法，希望有一天会收到霍格沃兹的录取通知书 = =
    button:
      enable: true
      icon: fab fa-github
      text: GitHub
      link: https://github.com/wellorbetter
  card_announcement:
    enable: false
  card_recent_post:
    enable: true
    limit: 5
    sort: date
    sort_order:
  card_categories:
    enable: true
    limit: 8
    expand: none
    sort_order:
  card_tags:
    enable: true
    limit: 40
    color: true
    orderby: random
    order: 1
    sort_order:
  card_archives:
    enable: true
    type: monthly
    format: MMMM YYYY
    order: -1
    limit: 8
    sort_order:
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    sort_order:

# 动画
animation: true

# 加载动画
preloader:
  enable: true
  source: 1
  pace_css_url:

# 返回顶部
back2top:
  enable: true
  item_show: false
  scroll_percent: true

# 阅读进度条
reading_progress:
  enable: true
  start_at: left
  position: top
  reversed: false
  color: "#37c6c0"
  height: 3px

# 版权声明
post_copyright:
  enable: true
  decode: false
  author_href:
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# 打赏
reward:
  enable: false

# 文章过期提醒
noticeOutdate:
  enable: true
  style: flat
  limit_day: 365
  position: top
  message_prev: 本文已超过
  message_next: 天未更新，部分内容可能已过时。

# 数学公式 KaTeX
math:
  enable: true
  per_page: true
  method: katex
  katex:
    enable: true
    cdn:
      css: https://cdn.jsdelivr.net/npm/katex@latest/dist/katex.min.css
      js: https://cdn.jsdelivr.net/npm/katex@latest/dist/katex.min.js
      copy_tex_js: https://cdn.jsdelivr.net/npm/katex@latest/dist/contrib/copy-tex.min.js
      copy_tex_css: https://cdn.jsdelivr.net/npm/katex@latest/dist/contrib/copy-tex.min.css

# 自定义注入
inject:
  head:
    - <link rel="stylesheet" href="/css/custom.css">
  bottom:
