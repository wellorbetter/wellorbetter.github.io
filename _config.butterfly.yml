# Butterfly 主题配置

# 导航菜单
nav:
  logo:
  display_title: true
  fixed: false

menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open

# 社交链接
social:
  fab fa-github: https://github.com/wellorbetter || Github

# 头像
avatar:
  img: https://avatars.githubusercontent.com/u/wellorbetter
  effect: false

# 顶部图
disable_top_img: false
index_img: false
default_top_img: false

# 文章封面
cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  position: top
  default_cover:

# 文章信息
post_meta:
  page:
    date_type: created
    date_format: YYYY-MM-DD
    categories: true
    tags: true
    label: true
  post:
    date_type: created
    date_format: YYYY-MM-DD
    categories: true
    tags: true
    label: true

# 目录
toc:
  post: true
  page: false
  number: false
  expand: false
  style_simple: false
  scroll_percent: true

# 代码块
highlight_theme: pale night
highlight_copy: true
highlight_lang: true
highlight_shrink: false
highlight_height_limit: false
code_word_wrap: false

# 字体
font:
  global-font-size:
  code-font-size:
  font-family:
  code-font-family:

# 主题色
theme_color:
  enable: true
  main: "#49B1F5"
  paginator: "#00c4b6"
  button_hover: "#FF7242"
  text_selection: "#00c4b6"
  link_color: "#99a9bf"
  meta_color: "#858585"
  hr_color: "#A4D8FA"
  code-foreground: "#F8F8F2"
  code-background: "rgba(0,0,0,0.67)"
  toc-highlight: "#0099FF"
  blockquote-padding-color: "#49b1f5"
  blockquote-background-color: "#49b1f5"
  scrollbar-color: "#49b1f5"
  meta-theme-color-light: "#ffffff"
  meta-theme-color-dark: "#0d0d0d"

# 暗色模式
darkmode:
  enable: true
  button: true
  autoChangeMode: false
  default: light

# footer
footer:
  owner:
    enable: true
    since: 2022
  custom_text:
  copyright: false

# 侧边栏
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description:
    button:
      enable: false
  card_announcement:
    enable: false
    content:
  card_recent_post:
    enable: true
    limit: 5
    sort: date
    sort_order:
  card_categories:
    enable: true
    limit: 8
    expand: none
    sort_order:
  card_tags:
    enable: true
    limit: 40
    color: false
    orderby: random
    order: 1
    sort_order:
  card_archives:
    enable: true
    type: monthly
    format: MMMM YYYY
    order: -1
    limit: 8
    sort_order:
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    sort_order:

# 搜索
local_search:
  enable: false

# 分页
index_generator:
  per_page: 10

# 动画
animation: true

# 加载动画
preloader:
  enable: false

# 返回顶部
back2top:
  enable: true
  item_show: false
  scroll_percent: true

# 阅读进度
reading_progress:
  enable: true
  start_at: left
  position: top
  reversed: false
  color: "#37c6c0"
  height: 3px

# 按钮
rightside_scroll_percent: true

# 版权
post_copyright:
  enable: false

# 打赏
reward:
  enable: false
